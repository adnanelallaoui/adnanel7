      padding: var(--u3) 0 var(--u2) 0;
      color: var(--text-sec);
      font-size: 1.08em;
      background: var(--surface);

      opacity: 0.93;
      letter-spacing: 0.36px;
      user-select: none;
      font-weight: 520;
      box-shadow: 0 -2px 12px #191e3622;

      font-weight: 700;

        transform: translateX(-110%);

        box-shadow: 18px 0 52px #242c6060;
        transition: transform .32s cubic-bezier(.48,.86,.18,1.18);
      }
      .sidebar.open { transform: translateX(0%);}
      .player-area { grid-column: 1/2; margin-top: 0;}
    }
    @media (max-width: 599px) {
      .sidebar {
        top: unset; left: 0; right: 0; bottom: 0;
        width: 100vw; max-width: 98vw;
        height: 425px; min-height: 270px;
        border-radius: var(--radius) var(--radius) 0 0;
        box-shadow: 0 -18px 58px #141828eb;
        transform: translateY(112%);
        transition: transform 310ms cubic-bezier(.32,.89,.23,1);
      }
      .sidebar.open { transform: translateY(0); }
      .player-area, .player-frame {
        width: 100vw !important;
        min-width: 100vw !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        max-height: none;
        margin: 0;
      }
      header { padding-left: var(--u2); padding-right: var(--u2);}
      .player-controls__bar { min-width: 78vw; gap: var(--u2);}
      .channels-list { grid-template-columns: 1fr!important; }
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      left: 0;top: 0;right: 0;bottom: 0;
      background: rgba(16,18,30,0.39);
      z-index: 333;
      transition: opacity .27s cubic-bezier(.17,.97,.28,1);
      pointer-events: none;
    }
    .sidebar-draw-open .sidebar-overlay {
      display: block;
      pointer-events: auto;
      opacity: 1;
      backdrop-filter: blur(5px);
    }

    .sidebar-toggle-btn {
      display: none;
      position: fixed;
      top: var(--u3);
      left: var(--u3);
      z-index: 999;
      height: 54px;
      min-width: 54px;
      width: 54px;
      border-radius: 50%;
      border: none;
      background: var(--accent-grad);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 26px #53f1ae42,0 1.5px 6px #23264844;
      font-size: var(--icon-lg);
      align-items: center;
      justify-content: center;
      padding: 0;
      display: flex;
      transition: background 160ms, box-shadow 180ms, transform .13s;
      outline: none;
      filter: drop-shadow(0 2px 10px #50e2c033);
      border: 2.5px solid #262a3b;
    }
    .sidebar-toggle-btn:active,
    .sidebar-toggle-btn:focus-visible {
      background: linear-gradient(93deg, #5a73fb 8%, #53f1ae 93%);
      box-shadow: 0 8px 24px #53f1ae80;
      border-color: #53f1ae99;
      transform: scale(1.08);
    }
    @media (max-width: 1100px) {
      .sidebar-toggle-btn { display: flex;}
    }
    @media (max-width: 599px) {
      .sidebar-toggle-btn { 
        top: var(--u2);
        left: unset; right: var(--u2);
      }
    }

      { "name": "beIN SPORTS 7 |H265|", "desc": "Breaking sports events & headlines.", "thumb": "http://asmr4k.pro:8080/images/Kv_wNAqMUjImlYeWbnmrz77UxZNjla9VFc2BbzOAnp2IzbQ5Mi2AouKzGKiqGo_13yaHD_8nbAxDvg2yJKEgOVAcTcJqVZrXjF4sH5Bda6c.png", "url": "http://asmr4k.world:8080/UjF6V3g3c2ZSekxxVmxvWXRhSURtdDN5YWRTZDNhelVHNW4zWStQVytYVT0" },
      { "name": "beIN SPORTS 8 |H265|", "desc": "Breaking sports events & headlines.", "thumb": "http://asmr4k.pro:8080/images/Kv_wNAqMUjImlYeWbnmrz77UxZNjla9VFc2BbzOAnp3Q39AIoXC_3o-TIPqlW_Qx92DcI6jmYHP9k0S_RHm1fgf-05eWaRjzmrVRQ0w34fU.png", "url": "http://asmr4k.world:8080/UjF6V3g3c2ZSekxxVmxvWXRhSURtZ0EzT3RBd0wyNXZ3UE5lNmZVWEs4UT0" },
      { "name": "beIN SPORTS 9 |H265|", "desc": "Breaking sports events & headlines.", "thumb": "http://asmr4k.pro:8080/images/Kv_wNAqMUjImlYeWbnmrz77UxZNjla9VFc2BbzOAnp3Q39AIoXC_3o-TIPqlW_QxlUga_UTnbM4dVSSKc1SAcRkbh4w0qN9W6IgsHzNmW3Q.png", "url": "http://asmr4k.world:8080/UjF6V3g3c2ZSekxxVmxvWXRhSURtbUFtMmdORGdKc1N6NkVUNkx5SmRQYz0" }, 
    ];

    let filteredChannels = [...channels];
    let currentIdx = 0;
    let currentPlayer = null;
    let channelSwitching = false;
    let isSidebarOpen = false;
    let controlsTimeout = null;
    let viewerCountVal = 0;
    let isMobile = false, isTablet = false, isDesktop = false;

    // DOM refs
    const dom = {
      sidebar: document.getElementById('sidebar'),
      sidebarOverlay: document.getElementById('sidebar-overlay'),
      sidebarToggleBtn: document.getElementById('sidebar-toggle-btn'),
      channelsList: document.getElementById('channels-list'),
      search: document.getElementById('search'),
      video: document.getElementById('video-player'),
      playerFrame: document.getElementById('player-frame'),
      buffering: document.getElementById('buffering'),
      playerControls: document.getElementById('player-controls'),
      playerControlsBar: document.getElementById('player-controls-bar'),
      btnMute: document.getElementById('btn-mute'),
      btnFullscreen: document.getElementById('btn-fullscreen'),
      muteIcon: document.getElementById('mute-icon'),
      muteLabel: document.getElementById('mute-label'),
      fullscreenLabel: document.getElementById('fullscreen-label'),
      liveBadge: document.getElementById('live-badge'),
      viewerCounter: document.getElementById('viewer-counter'),
      viewerNum: document.getElementById('online-number'),
      viewerLabel: document.getElementById('online-label')
    };

    function detectLayout() {
      const w = window.innerWidth;
      isDesktop = w >= 1024;
      isTablet = w >= 600 && w < 1024;
      isMobile = w < 600;
    }

    function openSidebar() {
      if(isDesktop) return;
      dom.sidebar.classList.add('open');
      document.body.classList.add('sidebar-draw-open');
      dom.sidebarOverlay.style.display = 'block';
      isSidebarOpen = true;
      if(dom.search) setTimeout(()=>dom.search.focus(),90);
    }
    function closeSidebar() {
      dom.sidebar.classList.remove('open');
      document.body.classList.remove('sidebar-draw-open');
      dom.sidebarOverlay.style.display = 'none';
      isSidebarOpen = false;
    }
    function onResizeLayout() {
      detectLayout();
      closeSidebar();
      if(isDesktop) {
        dom.sidebar.style.position = 'relative';
        dom.sidebar.style.height = 'auto';
        dom.sidebar.style.transform = '';
        dom.sidebar.style.left = '';
        dom.sidebarToggleBtn.style.display = 'none';
      } else {
        dom.sidebar.style.position = 'fixed';
        dom.sidebarToggleBtn.style.display = 'flex';
      }
    }
    window.addEventListener('resize', onResizeLayout);

    function renderChannels() {
      dom.channelsList.innerHTML = '';
      filteredChannels.forEach((ch, idx) => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        if(idx === currentIdx) card.classList.add('selected');
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        const logoWrap = document.createElement('div');
        logoWrap.className = 'channel-card__logo';
        const logo = document.createElement('img');
        logo.alt = ch.name + ' logo';
        logo.setAttribute('data-src', ch.thumb);
        logo.src = '';
        logoWrap.appendChild(logo);
        card.appendChild(logoWrap);
        const info = document.createElement('div');
        info.className = 'channel-card__info';
        const title = document.createElement('div');
        title.className = 'channel-card__title';
        title.innerText = ch.name;
        info.appendChild(title);
        const live = document.createElement('div');
        live.className = 'channel-card__live';
        live.innerText = 'LIVE';
        info.appendChild(live);
        card.appendChild(info);
        card.onclick = ()=> playChannel(idx,true);
        card.onkeydown = e => {
          if(e.key === 'Enter' || e.key === ' ') playChannel(idx,true);
        };
        card.onmouseover = card.onfocus = () => {};
        card.onmouseout = card.onblur = () => {};
        dom.channelsList.appendChild(card);
      });
      lazyLoadChannelThumbs();
    }

    function lazyLoadChannelThumbs() {
      const imgs = dom.channelsList.querySelectorAll('.channel-card__logo img');
      if ('IntersectionObserver' in window) {
        const io = new window.IntersectionObserver((entries,obs)=>{
          entries.forEach(entry=>{
            if(entry.isIntersecting){
              const img = entry.target;
              img.src = img.dataset.src;
              img.onload = ()=> img.closest('.channel-card').classList.add('loaded');
              obs.unobserve(img);
            }
          });
        },{threshold:0.09, rootMargin:"112px"});
        imgs.forEach(img=>io.observe(img));
      } else {
        imgs.forEach(img=>{
          img.src=img.dataset.src;
          img.onload=()=>img.closest('.channel-card').classList.add('loaded');
        });
      }
    }

    dom.search.addEventListener('input', function(){
      const val = this.value.trim().toLowerCase();
      filteredChannels = channels.filter(
        c=>c.name.toLowerCase().includes(val)
         || (c.desc||'').toLowerCase().includes(val)
      );
      renderChannels();
    });

    function playChannel(idx, withFade=true) {
      if(channelSwitching || idx<0 || idx>=filteredChannels.length) return;
      const realIdx = channels.findIndex(c=>c.name===filteredChannels[idx].name);
      if(realIdx === currentIdx && !withFade) return;
      channelSwitching = true;
      currentIdx = realIdx;
      dom.channelsList.querySelectorAll('.channel-card').forEach((e,i)=> {
        e.classList.toggle('selected', channels.findIndex(c=>c.name===filteredChannels[i].name)===currentIdx);
      });
      dom.buffering.style.display='';
      dom.video.pause();
      dom.playerFrame.classList.add('player-fade');
      setTimeout(()=>{
        if(currentPlayer) try{currentPlayer.destroy();}catch{}
        if(window.mpegts && mpegts.isSupported()) {
          currentPlayer = mpegts.createPlayer({type:'mpegts', isLive:true, url:channels[currentIdx].url, enableWorker:true, lazyLoad:true});
          currentPlayer.attachMediaElement(dom.video);
          currentPlayer.load();
          currentPlayer.play();
        } else {
          dom.video.src = channels[currentIdx].url;
          dom.video.play();
        }
        setTimeout(()=>{
          dom.buffering.style.display='none';
          dom.playerFrame.classList.remove('player-fade');
          channelSwitching = false;
        },280);
      }, 350);

      if(!isDesktop) closeSidebar();
    }

    let controlsVisible = true;
    function showControls() {
      dom.playerControls.style.opacity = "1";
      dom.playerControls.style.pointerEvents = "auto";
      controlsVisible = true;
      clearTimeout(controlsTimeout);
      if(isMobile) {
        controlsTimeout = setTimeout(hideControls,2200);
      }
    }
    function hideControls() {
      if(!isMobile) return;
      dom.playerControls.style.opacity = "0";
      dom.playerControls.style.pointerEvents = "none";
      controlsVisible = false;
    }
    dom.playerFrame.addEventListener('pointermove', showControls);
    dom.playerFrame.addEventListener('mouseenter', showControls);
    dom.playerFrame.addEventListener('mouseleave', ()=>{ if(isMobile) hideControls(); });

    dom.video.addEventListener('pointermove', showControls);
    dom.video.addEventListener('click', ()=>{
      if(isMobile) {
        if(controlsVisible) hideControls();
        else showControls();
      }
    });

    function setMuteIcon(state) {
      if(!dom.muteIcon) return;
      dom.muteIcon.innerHTML = state
        ? `<svg id="mute-svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M23 9L17 15"></path><path d="M17 9l6 6"></path></svg>`
        : `<svg id="mute-svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19 9v6a2 2 0 0 1-2 2h-1"></path></svg>`;
    }
    if(dom.btnMute) dom.btnMute.onclick = function() {
      dom.video.muted = !dom.video.muted;
      dom.muteLabel.textContent = dom.video.muted ? "Muted" : "Unmuted";
      setMuteIcon(dom.video.muted);
    };
    if(dom.btnFullscreen) dom.btnFullscreen.onclick = function() {
      let el = dom.playerFrame;
      if(document.fullscreenElement){
        document.exitFullscreen();
      }else if(el.requestFullscreen){
        el.requestFullscreen();
      }else if(el.webkitRequestFullscreen){
        el.webkitRequestFullscreen();
      }
    };

    document.addEventListener('keydown', (e)=>{
      if(document.activeElement.tagName==='INPUT') return;
      if(e.key==='ArrowLeft'){ playPrevChannel(); }
      else if(e.key==='ArrowRight'){ playNextChannel(); }
    });

    function playPrevChannel() {
      let idx = (currentIdx-1+channels.length)%channels.length;
      playChannel(channels.findIndex((c)=>c===channels[idx]),true);
    }
    function playNextChannel() {
      let idx = (currentIdx+1)%channels.length;
      playChannel(channels.findIndex((c)=>c===channels[idx]),true);
    }
    dom.video.addEventListener('waiting',()=>{dom.buffering.style.display='';});
    dom.video.addEventListener('playing',()=>{dom.buffering.style.display='none';});

    dom.sidebarToggleBtn.addEventListener('click', ()=> {
      isSidebarOpen ? closeSidebar(): openSidebar();
    });
    dom.sidebarOverlay.addEventListener('click', closeSidebar);

    let touchStartY;
    dom.sidebar.addEventListener('touchstart', function(e){
      if(!isMobile) return;
      touchStartY = e.touches[0].clientY;
    });
    dom.sidebar.addEventListener('touchmove', function(e){
      if(!isMobile || typeof touchStartY==="undefined") return;
      let moveY = e.touches[0].clientY;
      if((moveY-touchStartY) > 32) closeSidebar();
    });

    dom.playerFrame.addEventListener('touchstart', function(e){
      if(!isMobile) return;
      touchStartY = e.touches[0].clientY;
    });
    dom.playerFrame.addEventListener('touchmove', function(e){
      if(!isMobile || typeof touchStartY==="undefined") return;
      let moveY = e.touches[0].clientY;
      if((touchStartY-moveY) > 32 && !isSidebarOpen) openSidebar();
    });

    let touchX, touchT;
    dom.playerFrame.addEventListener('touchstart', function(e) {
      let t = e.touches[0];
      touchX = t.clientX; touchT = Date.now();
    });
    dom.playerFrame.addEventListener('touchend', function(e) {
      if(typeof touchX === 'undefined') return;
      const t = e.changedTouches[0];
      let dx = t.clientX - touchX;
      let dt = Date.now() - touchT;
      if(dt < 900 && Math.abs(dx)>40) {
        if(dx < -20) playNextChannel();
        else if(dx > 20) playPrevChannel();
      }
      touchX = undefined;
    });

    function updateOnlineViewers() {
      if (viewerCountVal === 0) {
        viewerCountVal = Math.floor(186500 + Math.random()*2000);
      }
      let delta = Math.floor((Math.random()-0.5)*33);
      viewerCountVal += delta;
      if(viewerCountVal < 185000) viewerCountVal = 185000 + Math.floor(Math.random()*111);
      if(viewerCountVal > 206000) viewerCountVal = 205200 - Math.floor(Math.random()*51);
      dom.viewerNum.textContent = Math.max(0,Math.round(viewerCountVal)).toLocaleString('en-US');
      setTimeout(updateOnlineViewers, 1100 + Math.random()*700);
    }

    function initIptvUi() {
      detectLayout();
      renderChannels();
      dom.muteLabel.textContent = "Unmuted";
      setMuteIcon(false);
      dom.btnFullscreen.setAttribute("data-fullscreen", "0");
      dom.playerControls.style.opacity = "1";
      dom.playerControls.style.pointerEvents = "auto";
      playChannel(0, false);

      if(dom.viewerNum){
        dom.viewerNum.textContent = "--";
        updateOnlineViewers();
      }
      document.getElementById("copyright-year").textContent = new Date().getFullYear();
    }
    document.addEventListener("DOMContentLoaded", ()=>{
      onResizeLayout();
      initIptvUi();
    });
    window.addEventListener('resize', onResizeLayout);

    dom.sidebar.addEventListener('keydown', function(event) {
      if(event.key !== "Tab") return;
      const focusEls = dom.sidebar.querySelectorAll('input, .channel-card');
      if(!focusEls.length) return;
      if(event.shiftKey && document.activeElement === focusEls[0]) {
        event.preventDefault();
        focusEls[focusEls.length-1].focus();
      } else if(!event.shiftKey && document.activeElement === focusEls[focusEls.length-1]) {
        event.preventDefault();
        focusEls[0].focus();
      }
    });
  </script>
